# Optional PostgreSQL-in-container for experiments (not the path in README.md;
# the documented control host uses native PostgreSQL on the server).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackonedb}
      POSTGRES_USER: ${POSTGRES_USER:-trackone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackone}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trackone_pg:/var/lib/postgresql/data

volumes:
  trackone_pg:
