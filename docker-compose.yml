# Optional PostgreSQL for local/dev control host (Linux or Docker Desktop).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackonedb}
      POSTGRES_USER: ${POSTGRES_USER:-trackone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackone}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trackone_pg:/var/lib/postgresql/data

volumes:
  trackone_pg:
